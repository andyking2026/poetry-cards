  author: "曹操",
  dynasty: "东汉",
  text: "东临碣石，以观沧海。\n水何澹澹，山岛竦峙。\n树木丛生，百草丰茂。\n秋风萧瑟，洪波涌起。\n日月之行，若出其中；\n星汉灿烂，若出其里。\n幸甚至哉，歌以咏志。",

  keyLines: "日月之行，若出其中；星汉灿烂，若出其里。",

  translation: "旅途延伸到青山之外，船行在碧绿的江水前。潮水涨平，两岸显得开阔；顺风吹来，船帆高高悬挂。海上的太阳从残夜中升起，江南的春意已经进入旧年。寄往家乡的书信要送到哪里呢？希望北归的大雁把它带到洛阳。",

  }]

  text: "唧唧复唧唧，木兰当户织。不闻机杼声，唯闻女叹息。\n问女何所思，问女何所忆。女亦无所思，女亦无所忆。\n昨夜见军帖，可汗大点兵，军书十二卷，卷卷有爷名。\n阿爷无大儿，木兰无长兄，愿为市鞍马，从此替爷征。\n东市买骏马，西市买鞍鞯，南市买辔头，北市买长鞭。\n旦辞爷娘去，暮宿黄河边。不闻爷娘唤女声，但闻黄河流水鸣溅溅。\n旦辞黄河去，暮至黑山头。不闻爷娘唤女声，但闻燕山胡骑鸣啾啾。\n万里赴戎机，关山度若飞。朔气传金柝，寒光照铁衣。\n将军百战死，壮士十年归。\n归来见天子，天子坐明堂。策勋十二转，赏赐百千强。\n可汗问所欲，木兰不用尚书郎；愿驰千里足，送儿还故乡。\n爷娘闻女来，出郭相扶将；阿姊闻妹来，当户理红妆；\n小弟闻姊来，磨刀霍霍向猪羊。\n开我东阁门，坐我西阁床。脱我战时袍，著我旧时裳。\n当窗理云鬓，对镜帖花黄。\n出门看火伴，火伴皆惊忙：同行十二年，不知木兰是女郎。\n雄兔脚扑朔，雌兔眼迷离；双兔傍地走，安能辨我是雄雌？",

function getDayOfYear() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  return Math.floor((now - start) / 86400000);
}
function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 16807 + 7) % 2147483647;
    const j = s % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function normalizeAnswer(str) {
  return str.replace(/[\s\u3000\uff0c\u3002\uff01\uff1f\u3001\uff1b\uff1a\u201c\u201d\u2018\u2019\uff08\uff09\u300a\u300b\u3010\u3011\u00b7\u2014\u2026~\uff5e,.!?;:\"'()\[\]\-]/g, "").trim();
}
function getTodayPoems() {
  const day = getDayOfYear() + new Date().getFullYear() * 366;
  const gradeOrder = {
    "\u4e03\u4e0a": 1,
    "\u4e03\u4e0b": 2,
    "\u516b\u4e0a": 3,
    "\u516b\u4e0b": 4,
    "\u4e5d\u4e0a": 5,
    "\u4e5d\u4e0b": 6
  };
  const groups = {};
  POEMS.forEach(p => {
    if (!groups[p.grade]) groups[p.grade] = [];
    groups[p.grade].push(p);
  });
  const ordered = [];
  ["\u4e03\u4e0a", "\u4e03\u4e0b", "\u516b\u4e0a", "\u516b\u4e0b", "\u4e5d\u4e0a", "\u4e5d\u4e0b"].forEach(g => {
    if (groups[g]) ordered.push(...seededShuffle(groups[g], day));
  });
  const picked = [];
  let seed = day;
  while (picked.length < 3 && picked.length < ordered.length) {
    seed = (seed * 16807 + 7) % 2147483647;
    const candidate = ordered[seed % ordered.length];
    if (!picked.includes(candidate)) picked.push(candidate);
  }
  picked.sort((a, b) => (gradeOrder[a.grade] || 9) - (gradeOrder[b.grade] || 9) || a.id - b.id);
  return picked;
}
